apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: linker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: blessedsoft/dev-link-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001

          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: linker-config
                  key: PORT
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: linker-config
                  key: DATABASE_URL
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: linker-config
                  key: NEXTAUTH_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: NEXTAUTH_SECRET
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: CLOUDINARY_CLOUD_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: CLOUDINARY_API_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: linker
spec:
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001